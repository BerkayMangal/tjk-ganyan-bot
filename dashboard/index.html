<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TJK ARB v2 — AGF Arbitraj + FLB + Dutch</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--bg1:#0c0c0c;--bg2:#0f0f0f;--border:#1a1a1a;--border2:#222;--text:#e0e0e0;--text2:#888;--text3:#555;--text4:#333;--green:#00e68a;--red:#ff3b3b;--yellow:#FFD60A;--blue:#3b9fff;--purple:#a78bfa;--orange:#f59e0b;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',-apple-system,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
input:focus{outline:1px solid #333}input[type=number]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 4px var(--green)44}50%{box-shadow:0 0 14px var(--green)66}}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.badge{padding:2px 7px;border-radius:2px;font-size:10px;font-weight:800;letter-spacing:.8px;white-space:nowrap;display:inline-block}
.tab-btn{background:transparent;border:1px solid transparent;color:var(--text3);padding:5px 14px;border-radius:3px;font-size:11px;cursor:pointer;font-weight:400;letter-spacing:.5px;font-family:var(--sans);transition:all .2s}
.tab-btn.active{background:var(--border);border-color:var(--border2);color:#fff;font-weight:700}
.tab-btn:hover{color:var(--text2)}
.region-btn{background:transparent;border:1px solid #141414;color:var(--text3);padding:4px 12px;border-radius:3px;font-size:11px;cursor:pointer;font-weight:600;font-family:var(--sans);transition:all .2s}
.region-btn.active{background:var(--border);border-color:var(--border2);color:#fff}
.ctrl-input{background:#111;border:1px solid var(--border);color:#ccc;padding:4px 8px;border-radius:3px;font-size:12px;font-family:var(--mono);text-align:right}
.src-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:3px;font-size:11px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;overflow:hidden;animation:fadeIn .3s ease}
.sum-card{background:var(--bg1);border:1px solid var(--border);border-radius:4px;padding:12px 14px}
.sum-card .lb{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:4px}
.sum-card .vl{font-size:18px;font-weight:800;font-family:var(--mono)}
.race-table{width:100%;border-collapse:collapse;font-size:12px}
.race-table th{padding:7px 5px;font-size:9px;font-weight:700;letter-spacing:.7px;color:var(--text3);text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
.race-table td{padding:7px 5px;border-bottom:1px solid #111;font-size:12px}
.race-table tr.vstrong{background:rgba(0,230,138,.04)}
.race-table tr.vsignal{background:rgba(255,214,10,.03)}
.race-table tr.vanti{background:rgba(255,59,59,.03)}
.flb-bar{display:inline-block;width:32px;height:6px;border-radius:3px;vertical-align:middle;margin-right:4px}
.warn-tag{font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700;letter-spacing:.5px;display:inline-block;margin:1px 0}
.dutch-panel{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:16px;margin-top:16px}
.strat-card{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.strat-card .st{font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px}
.strat-card pre{font-family:var(--mono);font-size:12px;color:var(--text2);line-height:1.8;white-space:pre-wrap}
.strat-card .stxt{font-size:12px;color:#777;line-height:1.8}
.t-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.t-row .tn{font-size:11px;color:var(--text3);width:120px;text-align:right}
.t-row .tb{flex:1;height:8px;background:#111;border-radius:4px;overflow:hidden}
.t-row .tf{height:100%;border-radius:4px;transition:width .6s}
.t-row .tp{font-size:12px;font-family:var(--mono);font-weight:700;width:40px;text-align:right}
@media(max-width:900px){#summary{grid-template-columns:repeat(3,1fr)!important}}
@media(max-width:600px){#summary{grid-template-columns:repeat(2,1fr)!important}}
</style>
</head>

<!-- CONTROLS -->

  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px">
      <span style="font-size:10px;color:var(--text3);font-weight:700">BANK</span>

</div>

<div id="sources" style="padding:8px 20px;border-bottom:1px solid #111;display:flex;gap:5px;flex-wrap:wrap"></div>

<!-- FOOTER -->
<div style="border-top:1px solid #111;padding:10px 20px;display:flex;justify-content:space-between;font-size:10px;color:#222;margin-top:40px">
  <span>TJK AGF ARB v2 | FLB: Griffith (1949) | Trend: Shin (1993) | Edge: Hausch & Ziemba (1990)</span>
  <span id="footNote">DEMO</span>

<script>
const TJK_TO=.27;
const SRC={tjk:{n:"TJK AGF",c:"#ff3b3b",to:.27},tab_au:{n:"TAB.com.au",c:"#00e68a",to:.16},betfair:{n:"Betfair Exc",c:"#FFD60A",to:.02},oddschk:{n:"Oddschecker",c:"#a78bfa",to:.08},twinspires:{n:"TwinSpires",c:"#3b9fff",to:.20},betfair_uk:{n:"Betfair UK",c:"#f59e0b",to:.02}};
const ST={"betfair":"exchange","betfair_uk":"exchange","tab_au":"tote","twinspires":"tote","oddschk":"bookmaker"};
const REGIONS=["ALL","USA","FRA","AUS","UAE","GBR"];
let view="races",region="ALL",D=null,dutchSelected=[];

// ─── MATH ───
function nP(o,t){return(!o||o<=1)?0:(1/o)/(1+t)}
function cE(tjk,ref,rt){return nP(ref,rt)-nP(tjk,TJK_TO)}
function hK(e,o){if(e<=0)return 0;let b=o-1,p=nP(o,TJK_TO)+e,q=1-p;if(b<=0||p<=0||p>=1)return 0;return Math.max(0,Math.min((b*p-q)/b/2,.15))}

function flbAdj(odds,edge){
  let pen,score;
  if(odds>50){pen=.50;score=20}
  else if(odds>30){pen=.35;score=35}
  else if(odds>20){pen=.20;score=50}
  else if(odds>10){pen=.10;score=70}
  else if(odds>5){pen=0;score=85}
  else if(odds>3){pen=-.05;score=90}
  else{pen=-.10;score=95}
  let adj=pen>0?edge*(1-pen):edge*(1+Math.abs(pen));
  let warn=odds>30&&edge>0?"LONGSHOT TRAP":"";
  return{raw:edge,adj,score,pen,warn}
}

function bestRef(h,srcs){
  let best=null,bp=0;
  let pri=srcs.filter(s=>ST[s]==="exchange").concat(srcs.filter(s=>ST[s]==="tote")).concat(srcs.filter(s=>ST[s]==="bookmaker"));
  for(let s of pri){let o=h[s];if(o&&o>1){let p=nP(o,SRC[s]?.to||.1);if(p>bp){bp=p;best={src:s,odds:o,prob:p}}}}
  return best
}

function analyze(h,srcs){
  let tjk=h.tjk;if(!tjk||tjk<=1)return{...h,edge:0,adjEdge:0,flbScore:0,flbPen:0,kelly:0,stake:0,signal:"none",warnings:[],srcCount:0};
  let ref=bestRef(h,srcs);
  if(!ref)return{...h,edge:0,adjEdge:0,flbScore:0,flbPen:0,kelly:0,stake:0,signal:"none",warnings:["NO REF"],srcCount:0};
  
  let tjkP=nP(tjk,TJK_TO), rawEdge=(ref.prob-tjkP)*100;
  let useFLB=document.getElementById("showFLB")?.checked!==false;
  let flb=useFLB?flbAdj(tjk,rawEdge):{raw:rawEdge,adj:rawEdge,score:85,pen:0,warn:""};
  let adj=flb.adj;
  let k=adj>0?hK(adj/100,tjk)*100:0;
  let bank=+(document.getElementById("bankroll")?.value)||5000;
  let stk=k/100*bank;
  let tw=+(document.getElementById("thWatch")?.value)||5;
  let ts=+(document.getElementById("thSignal")?.value)||10;
  let tg=+(document.getElementById("thStrong")?.value)||20;
  let sig=adj>=tg?"strong":adj>=ts?"signal":adj>=tw?"watch":"none";
  
  let warns=[];
  if(flb.warn)warns.push(flb.warn);
  if(rawEdge<-5)warns.push("ANTI-VALUE");
  let sc=srcs.filter(s=>h[s]&&h[s]>1).length;
  if(sc>=3&&adj>0)warns.push("MULTI-SRC "+sc);
  
  return{...h,edge:rawEdge,adjEdge:adj,flbScore:flb.score,flbPen:flb.pen,kelly:k,stake:stk,signal:sig,warnings:warns,ref,srcCount:sc}
}

function dutchCalc(horses,total){
  if(!horses.length)return{horses:[],total,profit:0};
  let tp=horses.reduce((s,h)=>s+(h.tjk>1?1/h.tjk:0),0);
  if(tp<=0)return{horses:[],total,profit:0};
  let res=horses.filter(h=>h.tjk>1).map(h=>{
    let share=(1/h.tjk)/tp, stk=total*share, prf=stk*h.tjk-total;
    return{name:h.name,num:h.num,odds:h.tjk,stake:Math.round(stk),profit:Math.round(prf)}
  });
  let avg=res.reduce((s,r)=>s+r.profit,0)/res.length;
  return{horses:res,total,profit:Math.round(avg),probSum:Math.round(tp*100)}
}

// ─── FETCH ───
async function fetchData(){
  try{let r=await fetch("/api/races");if(r.ok){D=await r.json()}}catch(e){D=null}
  if(!D)D=getDemoData();
  document.getElementById("srcBadge").textContent=D.source==="live"?"CANLI":"DEMO";
  document.getElementById("srcBadge").style.color=D.source==="live"?"var(--green)":"var(--text3)";
  document.getElementById("srcBadge").style.borderColor=D.source==="live"?"var(--green)":"var(--border2)";
  document.getElementById("footNote").textContent=D.source==="live"?"CANLI VERI - "+new Date(D.timestamp).toLocaleTimeString("tr-TR"):"DEMO VERI";
  render()
}

    {num:2,name:"Thunder Road",jockey:"L. Rivera",tjk:2.90,twinspires:3.50,betfair:3.80,oddschk:3.40},

  {id:"sunland",name:"Sunland Park ABD",country:"USA",flag:"\ud83c\uddfa\ud83c\uddf8",sources:["twinspires","oddschk"],races:[{number:4,time:"22:00",distance:"1400m",type:"ALW",pool_tl:15800,horses:[
    {num:1,name:"Copper Mine",jockey:"S. Elliott",tjk:4.20,twinspires:5.50,oddschk:5.00},
    {num:3,name:"Rio Bravo",jockey:"E. Meza",tjk:7.50,twinspires:6.00,oddschk:6.50},

    {num:7,name:"Mesa Sunrise",jockey:"K. Escobedo",tjk:20.00,twinspires:10.00,oddschk:11.00}]}]},
  {id:"turf_paradise",name:"Turf Paradise ABD",country:"USA",flag:"\ud83c\uddfa\ud83c\uddf8",sources:["twinspires","oddschk"],races:[{number:6,time:"23:30",distance:"1200m",type:"MCL",pool_tl:12400,horses:[
    {num:1,name:"Arizona Blaze",jockey:"K. Journet",tjk:3.80,twinspires:4.50,oddschk:4.20},
    {num:3,name:"Cactus Jack",jockey:"H. Figueroa",tjk:5.50,twinspires:4.00,oddschk:4.50},
    {num:5,name:"Desert Mirage",jockey:"L. Valenzuela",tjk:11.00,twinspires:16.00,oddschk:14.00},
    {num:7,name:"Sunset Ridge",jockey:"R. Baze",tjk:22.00,twinspires:12.00,oddschk:13.00},
    {num:9,name:"Tumble Dust",jockey:"A. Arroyo",tjk:40.00,twinspires:25.00,oddschk:20.00}]}]}
]}}

// ─── RENDER ───
function render(){if(!D)return;let m=document.getElementById("main");if(view==="races")renderRaces(m);else if(view==="dutch")renderDutch(m);else if(view==="yerli")renderYerli(m);else renderStrategy(m)}

function renderRaces(el){
  let tracks=region==="ALL"?D.tracks:D.tracks.filter(t=>t.country===region);
  let all=[];
  tracks.forEach(t=>t.races.forEach(r=>r.horses.forEach(h=>all.push(analyze(h,t.sources)))));
  let sigs=all.filter(h=>h.signal==="signal"||h.signal==="strong");
  let strs=all.filter(h=>h.signal==="strong");
  let antis=all.filter(h=>h.edge<-5);
  let totStk=all.reduce((s,h)=>s+(h.stake>0?h.stake:0),0);
  let bE=all.length?Math.max(...all.map(h=>h.adjEdge)):0;
  let bH=all.find(h=>h.adjEdge===bE);

  let html=`<div id="summary" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px">
    <div class="sum-card"><div class="lb">TOPLAM AT</div><div class="vl" style="color:var(--text2)">${all.length}</div></div>
    <div class="sum-card"><div class="lb">SINYAL</div><div class="vl" style="color:var(--yellow)">${sigs.length}</div></div>
    <div class="sum-card"><div class="lb">GUCLU</div><div class="vl" style="color:var(--green)">${strs.length}</div></div>
    <div class="sum-card"><div class="lb">ANTI-VALUE</div><div class="vl" style="color:var(--red)">${antis.length}</div></div>
    <div class="sum-card"><div class="lb">STAKE</div><div class="vl" style="color:var(--blue)">${totStk.toFixed(0)} TL</div></div>
    <div class="sum-card"><div class="lb">EN IYI EDGE</div><div class="vl" style="color:var(--green)">${bE>0?'+'+bE.toFixed(1)+'%':'\u2014'}</div></div>
    <div class="sum-card"><div class="lb">EN IYI AT</div><div class="vl" style="color:#fff;font-family:var(--sans);font-size:13px">${bH?.name||'\u2014'}</div></div>
  </div>`;

  if(!tracks.length){html+=`<div style="text-align:center;padding:60px;color:var(--text4)">Bu bolgede yaris yok</div>`;el.innerHTML=html;return}

  tracks.forEach(track=>{
    let sc=track.sources.map(s=>`<span style="font-size:9px;color:${SRC[s]?.c||'#666'};background:${(SRC[s]?.c||'#666')}10;padding:2px 6px;border-radius:2px;border:1px solid ${(SRC[s]?.c||'#666')}20">${SRC[s]?.n||s}</span>`).join("");
    html+=`<div style="margin-bottom:20px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:18px">${track.flag}</span><span style="font-size:15px;font-weight:800;color:#fff">${track.name}</span>
      <span class="badge" style="background:var(--border);color:var(--text2)">${track.country}</span>
      <div style="display:flex;gap:3px;margin-left:auto">${sc}</div></div>`;

    track.races.forEach(race=>{
      let an=race.horses.map(h=>analyze(h,track.sources)).sort((a,b)=>b.adjEdge-a.adjEdge);
      let vc=an.filter(h=>h.signal!=="none").length;
      let ac=an.filter(h=>h.edge<-5).length;
      let sh=track.sources.map(s=>`<th style="color:${SRC[s]?.c||'#666'};border-left:1px solid #141414;min-width:62px">${(SRC[s]?.n||s).split(' ')[0]}</th>`).join("");

      html+=`<div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2)">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-family:var(--mono);font-size:16px;font-weight:800;color:#fff;background:var(--border);padding:2px 8px;border-radius:3px;border:1px solid var(--border2)">R${race.number}</span>
            <span style="font-size:12px;color:var(--text2)">${race.time}</span>
            <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${race.distance||''}</span>
            ${race.type?`<span class="badge" style="background:rgba(167,139,250,.1);color:var(--purple);border:1px solid rgba(167,139,250,.2)">${race.type}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${race.pool_tl?`<span style="font-size:10px;color:var(--text3)">Havuz: <span style="color:var(--text2);font-family:var(--mono)">${race.pool_tl.toLocaleString('tr-TR')} TL</span></span>`:''}
            ${vc>0?`<span class="badge" style="background:rgba(0,230,138,.1);color:var(--green);border:1px solid rgba(0,230,138,.2)">${vc} VALUE</span>`:''}
            ${ac>0?`<span class="badge" style="background:rgba(255,59,59,.1);color:var(--red);border:1px solid rgba(255,59,59,.2)">${ac} ANTI</span>`:''}

  let stake=+(document.getElementById("dutchStake")?.value)||500;
  let result=dutchCalc(dutchSelected,stake);
  let el=document.getElementById("dutchResult");
  if(!el)return;
  
  if(!result.horses.length){el.innerHTML=`<div style="color:var(--red);font-size:13px">At sec (Yarislar > D sutunu)</div>`;return}

  let tb=takeouts.map(p=>`<div class="t-row"><span class="tn">${p.n}</span><div class="tb"><div class="tf" style="width:${p.p*3}%;background:${p.c}"></div></div><span class="tp" style="color:${p.c}">${p.p}%</span></div>`).join("");
  
  let flbRows=[{o:"< 3",p:"-10% (bonus)",s:"95",a:"En guvenilir",c:"var(--green)"},{o:"3-5",p:"-5%",s:"90",a:"Guvenilir",c:"var(--green)"},{o:"5-10",p:"0%",s:"85",a:"Notr",c:"var(--text2)"},{o:"10-20",p:"+10%",s:"70",a:"Dikkat",c:"var(--orange)"},{o:"20-30",p:"+20%",s:"50",a:"Riskli",c:"var(--orange)"},{o:"30-50",p:"+35%",s:"35",a:"TRAP",c:"var(--red)"},{o:"> 50",p:"+50%",s:"20",a:"COK RISKLI",c:"var(--red)"}];
  let flbTable=flbRows.map(r=>`<div style="display:grid;grid-template-columns:60px 80px 40px 1fr;gap:8px;padding:3px 0;border-bottom:1px solid #111;font-size:12px">
    <span style="color:var(--text2);font-family:var(--mono)">${r.o}</span>
    <span style="color:${r.c};font-family:var(--mono)">${r.p}</span>
    <span style="color:${r.c};font-family:var(--mono);font-weight:700">${r.s}</span>
    <span style="color:var(--text3)">${r.a}</span></div>`).join("");

  el.innerHTML=`<div style="max-width:900px">
    <div class="strat-card"><div class="st" style="color:var(--red)">TEZ</div>
      <div style="font-size:14px;color:#ccc;line-height:1.8">TJK yabanci yarislarinda havuz kucuk, kimse oynamiyor, oranlar verimsiz. Yurtdisi piyasalar <span style="color:var(--yellow)">50-100x likit</span>. Fark = <span style="color:var(--green);font-weight:700">value</span>. Birden fazla kaynaktan capraz dogrulama. <span style="color:var(--red)">TJK'ya karsi yapan kimse yok.</span></div></div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="strat-card"><div class="st" style="color:var(--green)">EDGE FORMULU</div>
        <pre>tjk_norm   = (1/AGF) / (1 + 0.27)
ref_norm   = (1/foreign) / (1 + takeout)
raw_edge   = ref_norm - tjk_norm
adj_edge   = raw_edge * (1 - FLB_penalty)
half_kelly = (b*p - q) / (2*b)

Referans: Exchange > Tote > Bookmaker
Birden fazla kaynak: en yuksek ref_norm</pre></div>
      <div class="strat-card"><div class="st" style="color:var(--purple)">FLB FILTRESI (Griffith 1949)</div>
        <div style="display:grid;grid-template-columns:60px 80px 40px 1fr;gap:8px;padding:0 0 6px;font-size:10px;color:var(--text3);font-weight:700;border-bottom:1px solid #222">
          <span>ODDS</span><span>PENALTY</span><span>SKOR</span><span>ANLAM</span></div>
        ${flbTable}
        <div style="margin-top:8px;font-size:11px;color:var(--text3)">Longshot overpriced, favori underpriced. TJK kucuk havuz = bias guclu.</div></div>
      <div class="strat-card"><div class="st" style="color:var(--yellow)">AKADEMIK REFERANSLAR</div><div class="stxt">
        <div><span style="color:var(--yellow)">1.</span> Hausch & Ziemba (1990) - Cross-track arb, %9.2 getiri</div>
        <div><span style="color:var(--yellow)">2.</span> Edelman & O'Brian (2004) - Tote arb, Avustralya</div>
        <div><span style="color:var(--yellow)">3.</span> Franck et al. (2009) - 1,450 inter-market arb</div>
        <div><span style="color:var(--yellow)">4.</span> O-U Process (2025) - Herding mispricing, JRA</div>
        <div><span style="color:var(--yellow)">5.</span> Griffith (1949) - Favorite-Longshot Bias</div>
        <div><span style="color:var(--yellow)">6.</span> Shin (1993) - Insider %1-2 edge</div>
        <div><span style="color:var(--yellow)">7.</span> Won (2025) - ML crowd bias, %93 acc</div></div></div>
      <div class="strat-card"><div class="st" style="color:var(--blue)">STRATEJI</div><div class="stxt">
        <div><span style="color:var(--green)">GANYAN:</span> adj_edge >= %10 -> 1/2 Kelly</div>
        <div><span style="color:var(--green)">ALTILI VALUE:</span> Edge yuksek + orta odds = bacak</div>
        <div><span style="color:var(--red)">ANTI-VALUE:</span> Kupona ALMA (overbet at)</div>
        <div><span style="color:var(--yellow)">DUTCH:</span> Birden fazla value at -> stake dagit</div>
        <div><span style="color:var(--purple)">FLB:</span> Longshot'a edge varsa penalty uygula</div>
        <div><span style="color:var(--orange)">TREND:</span> AGF sabit = guvenilir, volatile = dikkat</div>
        <div><span style="color:var(--red)">KURAL:</span> Ilk 3 hafta sadece log, para yok</div></div></div>
    </div>
    <div class="strat-card"><div class="st" style="color:var(--text2)">TAKEOUT KARSILASTIRMA</div>${tb}</div>
  </div>`;
}

// ─── UI ───
function switchView(v){view=v;document.querySelectorAll('.tab-btn').forEach(b=>{
  let match=v==='races'?'YARIS':v==='dutch'?'DUTCH':v==='yerli'?'YERLI':'STRAT';
  b.classList.toggle('active',b.textContent.includes(match))});render()}
function setRegion(r){region=r;document.querySelectorAll('.region-btn').forEach(b=>b.classList.toggle('active',b.dataset.region===r));render()}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("regionBtns").innerHTML=REGIONS.map(r=>`<button class="region-btn ${r==='ALL'?'active':''}" data-region="${r}" onclick="setRegion('${r}')">${r==='ALL'?'TUMU':r}</button>`).join("");
  let ss=[{n:"TJK HTML",s:"live",l:"2.1s"},{n:"TAB.com.au",s:"ready",l:"-"},{n:"Betfair",s:"ready",l:"-"},{n:"Oddschecker",s:"ready",l:"-"},{n:"TwinSpires",s:"ready",l:"-"},{n:"Betfair UK",s:"ready",l:"-"}];
  document.getElementById("sources").innerHTML=ss.map(s=>`<div class="src-chip"><span class="pulse" style="background:${s.s==='live'?'var(--green)':'var(--text3)'};box-shadow:0 0 5px ${s.s==='live'?'rgba(0,230,138,.3)':'transparent'}"></span><span style="color:${s.s==='live'?'var(--text2)':'var(--text3)'}">${s.n}</span><span style="color:var(--text4);font-family:var(--mono);font-size:10px">${s.l}</span></div>`).join("");
  setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleTimeString("tr-TR")},1000);
  fetchData()
})
</script>
